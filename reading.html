        :root{--primary:#4A90D9;--success:#4CD964;--accent:#FF6B9D;--warning:#FFCC02;--orange:#FF9500;--radius:20px}
        body{font-family:'Rubik',sans-serif;background:linear-gradient(135deg,#E8F4FD,#F0E6FF,#FFF0F5);min-height:100vh;padding:12px;padding-bottom:80px}
        .header{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.92);backdrop-filter:blur(10px);border-radius:var(--radius);padding:12px 16px;margin-bottom:12px;max-width:500px;margin-left:auto;margin-right:auto}
        .header h1{font-family:'Fredoka One',cursive;font-size:1.2em;color:#2E6BAD}
        .header a{text-decoration:none;font-size:1.3em}
        .level-tabs{display:flex;gap:6px;justify-content:center;max-width:500px;margin:0 auto 12px;flex-wrap:wrap}
        .level-tab{background:rgba(255,255,255,0.8);border:2px solid #ddd;border-radius:14px;padding:8px 14px;font-family:'Fredoka One',cursive;font-size:0.8em;cursor:pointer;transition:all 0.2s}
        .level-tab.active{background:var(--primary);color:white;border-color:var(--primary)}
        .level-tab:active{transform:scale(0.95)}
        .game-area{max-width:500px;margin:0 auto;background:rgba(255,255,255,0.92);backdrop-filter:blur(10px);border-radius:var(--radius);padding:20px;min-height:300px}
        .game-title{font-family:'Fredoka One',cursive;font-size:1.1em;color:#333;text-align:center;margin-bottom:14px}
        /* Slow mode button */
        .slow-btn{background:var(--success);color:white;border:none;border-radius:14px;width:40px;height:40px;font-size:1.2em;cursor:pointer;display:flex;align-items:center;justify-content:center}
        .slow-btn.active{background:var(--orange)}
        .replay-btn{background:var(--primary);color:white;border:none;border-radius:14px;width:40px;height:40px;font-size:1.2em;cursor:pointer;display:flex;align-items:center;justify-content:center}
        .replay-btn:active{transform:scale(0.9)}
        /* Word highlighting */
        .sentence{font-family:'Fredoka One',cursive;font-size:1.3em;line-height:2;text-align:center;direction:ltr;margin:12px 0}
        .sentence .word{cursor:pointer;padding:2px 4px;border-radius:6px;transition:all 0.2s;display:inline-block}
        .sentence .word:hover{background:#E3F2FD}
        .sentence .word.highlight{background:var(--warning);color:#333;transform:scale(1.1)}

        .match-images{display:flex;gap:10px;justify-content:center;margin:16px 0;flex-wrap:wrap}
        .match-img{width:90px;height:90px;background:#F8FAFF;border:3px solid #EEF2FF;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:3em;cursor:pointer;transition:all 0.2s}
        .match-img:active{transform:scale(0.95)}
        .match-img.correct{border-color:var(--success);background:#E8FFE8}
        .match-img.wrong{border-color:var(--accent);animation:shake 0.3s}
        .match-word{font-family:'Fredoka One',cursive;font-size:2em;text-align:center;color:var(--primary);margin:10px 0;direction:ltr}
        /* Level 2 - Sentence puzzle */
        .puzzle-img{font-size:4em;text-align:center;margin:10px 0}
        .puzzle-hint{text-align:center;color:#888;font-size:0.9em;margin-bottom:10px}
        .puzzle-slots{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;min-height:44px;margin:10px 0;padding:8px;background:#F8FAFF;border-radius:12px;border:2px dashed #ddd;direction:ltr}
        .puzzle-slot{background:white;border:2px solid #E8F0FE;border-radius:10px;padding:8px 12px;font-family:'Fredoka One',cursive;font-size:0.95em;color:var(--primary)}
        .puzzle-words{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:10px 0;direction:ltr}
        .puzzle-word{background:var(--primary);color:white;border:none;border-radius:10px;padding:8px 14px;font-family:'Fredoka One',cursive;font-size:0.9em;cursor:pointer;transition:all 0.2s}
        .puzzle-word:active{transform:scale(0.95)}
        .puzzle-word.used{opacity:0.3;pointer-events:none}
        /* Level 3 - Reading comprehension */
        .story-box{background:#F8FAFF;border-radius:12px;padding:14px;margin:10px 0;direction:ltr}
        .story-text{font-family:'Fredoka One',cursive;font-size:1.1em;line-height:1.8;color:#333}
        .translate-btn{background:linear-gradient(135deg,#FFF3E0,#FFFDE7);border:2px solid #FFE082;border-radius:10px;padding:8px 14px;font-size:0.8em;cursor:pointer;margin:8px auto;display:block}

        .option-btn{background:white;border:2px solid #E8F0FE;border-radius:12px;padding:12px;font-family:'Fredoka One',cursive;font-size:0.95em;cursor:pointer;transition:all 0.2s;text-align:center;direction:ltr}

        .option-btn.correct{background:var(--success);color:white;border-color:var(--success)}
        .option-btn.wrong{background:var(--accent);color:white;border-color:var(--accent)}

        /* Feedback */
        .feedback{text-align:center;font-family:'Fredoka One',cursive;font-size:1.1em;margin:10px 0;min-height:30px}

        @keyframes pop{from{transform:scale(0.8);opacity:0}to{transform:scale(1);opacity:1}}

<script>
let currentLevel = 1;
let slowMode = false;
let questionIdx = 0;
let lastReplayText = '';
let lastReplayElId = '';

function replayAudio(){
    if(lastReplayText && lastReplayElId){
        highlightSentence(lastReplayText, lastReplayElId);
    } else if(lastReplayText){
        speak(lastReplayText);
    }
}

// === SHARED STATE ===
let state = JSON.parse(localStorage.getItem('abcKidsState')) || {xp:0,coins:0,level:1,streak:0,totalCorrect:0};
function saveState(){localStorage.setItem('abcKidsState',JSON.stringify(state));}
function updateCoinsDisplay(){document.getElementById('rcVal').innerText = state.coins;}
function getCoinBonus(){
    const equipped = localStorage.getItem('abcKidsEquipped') || '';
    if(equipped === 'diamond') return 2; // 4 מטבעות סה"כ
    if(equipped === 'gold') return 1;    // 3 מטבעות סה"כ
    return 0;
}

function addXPandCoins(){
    state.xp += 2;
    state.coins += 2 + getCoinBonus();
    state.totalCorrect++;
    state.level = Math.min(Math.floor(state.xp / 20) + 1, 10);
    saveState();
    updateCoinsDisplay();
    showCoinFly();
}
function showCoinFly(){
    const counter = document.getElementById('readingCoins');
    const rect = counter.getBoundingClientRect();
    for(let i=0;i<3;i++){
        setTimeout(()=>{
            const coin = document.createElement('div');
            coin.className='coin-fly';
            coin.innerText='🪙';
            const startX = window.innerWidth/2 + (Math.random()-0.5)*100;
            const startY = window.innerHeight/2;
            coin.style.left=startX+'px';coin.style.top=startY+'px';
            coin.style.transform='scale(1.3)';coin.style.opacity='1';
            document.body.appendChild(coin);
            const duration=600;const start=performance.now();
            function animate(now){
                const p=Math.min((now-start)/duration,1);
                const ease=1-Math.pow(1-p,3);
                coin.style.left=(startX+(rect.left-startX)*ease)+'px';
                coin.style.top=(startY+(rect.top-startY)*ease)+'px';
                coin.style.transform=`scale(${1.3-ease})`;
                coin.style.opacity=String(1-p*0.3);
                if(p<1) requestAnimationFrame(animate);
                else{counter.style.transform='scale(1.2)';setTimeout(()=>counter.style.transform='',200);coin.remove();}
            }
            requestAnimationFrame(animate);
        },i*120);
    }
}

// === SPEECH ===
const praises = ['Great job!','Excellent!','Amazing!','Well done!','Perfect!','Awesome!','Fantastic!','Super!','You are a star!','Wonderful!'];
function randomPraise(){return praises[Math.floor(Math.random()*praises.length)];}

// בדיקה אם onboundary נתמך (לא עובד בפלאפון)
let _boundarySupported = null;
function checkBoundarySupport(cb){
    if(_boundarySupported !== null){cb(_boundarySupported);return;}
    const test = new SpeechSynthesisUtterance('test');
    let fired = false;
    test.onboundary = ()=>{ fired = true; };
    test.onend = ()=>{ _boundarySupported = fired; cb(_boundarySupported); };
    test.volume = 0; // שקט - רק לבדיקה
    window.speechSynthesis.speak(test);
}

// סימון מילים לפי טיימר (fallback לפלאפון)
let _highlightTimers = [];
function clearHighlightTimers(){ _highlightTimers.forEach(t=>clearTimeout(t)); _highlightTimers=[]; }

function highlightByTimer(text, elId, rate){
    clearHighlightTimers();
    const words = document.querySelectorAll(`#${elId} .word`);
    if(!words.length) return;
    // זמן ממוצע למילה: ~300ms במהירות רגילה, ~500ms במצב איטי
    const msPerChar = rate <= 0.65 ? 120 : 75;
    let delay = 300; // השהיה ראשונית
    words.forEach((w)=>{
        const wordLen = w.textContent.replace(/[^a-zA-Z]/g,'').length;
        const duration = Math.max(200, wordLen * msPerChar);
        const t = setTimeout(()=>{
            words.forEach(x=>x.classList.remove('highlight'));
            w.classList.add('highlight');
        }, delay);
        _highlightTimers.push(t);
        delay += duration;
    });
    // הסר סימון בסוף
    const t = setTimeout(()=>{ words.forEach(x=>x.classList.remove('highlight')); }, delay+200);
    _highlightTimers.push(t);
}

function speak(text, onEnd, highlightCb){
    if(!('speechSynthesis' in window)) return;
    clearHighlightTimers();
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    const rate = slowMode ? 0.6 : 1.0;
    u.lang='en-US'; u.rate = rate; u.pitch=1.1;
    if(onEnd) u.onend = onEnd;
    if(highlightCb){
        // נסה onboundary קודם, אם לא עובד - fallback לטיימר
        let boundaryFired = false;
        u.onboundary = (e)=>{
            if(e.name==='word'){
                boundaryFired = true;
                clearHighlightTimers(); // בטל טיימרים אם onboundary עובד
                highlightCb(e.charIndex, e.charLength);
            }
        };
        // הפעל טיימר תמיד - יבוטל אם onboundary יעבוד
        // מצא את ה-elId מה-highlightCb context
        if(u._elId) highlightByTimer(text, u._elId, rate);
    }
    window.speechSynthesis.speak(u);
}

function speakWord(word){
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(word);
    u.lang='en-US'; u.rate = slowMode ? 0.5 : 0.8; u.pitch=1.1;
    window.speechSynthesis.speak(u);
}

function toggleSlow(){

// === RENDER LEVELS ===
function setLevel(lvl){
    currentLevel = lvl;
    questionIdx = 0;
    document.querySelectorAll('.level-tab').forEach((t,i)=>t.classList.toggle('active',i===lvl-1));
    render();
}

function render(){
    const area = document.getElementById('gameArea');
    const dataMap = [level1Data, level2Data, level3Data, level4Data];
    const currentData = dataMap[currentLevel-1];
    // הגענו לסוף - הצג מסך סיום
    if(questionIdx >= currentData.length){
        showLevelComplete(area, currentData.length);
        return;
    }
    if(currentLevel===1) renderLevel1(area);
    else if(currentLevel===2) renderLevel2(area);
    else if(currentLevel===3) renderLevel3(area);
    else renderLevel4(area);
}

function showLevelComplete(area, total){
    clearHighlightTimers();
    window.speechSynthesis.cancel();
    speak('Congratulations! You finished all the questions!');
    area.innerHTML=`
        <div style="text-align:center;padding:20px">
            <div style="font-size:4em;margin-bottom:10px">🏆</div>
            <div style="font-family:'Fredoka One',cursive;font-size:1.4em;color:var(--primary-dark);margin-bottom:8px">!סיימתם את כל השאלות</div>
            <div style="font-size:0.9em;color:#888;margin-bottom:20px">${total} / ${total} שאלות ✅</div>
            <button class="next-btn" onclick="questionIdx=0;render()" style="margin:6px auto;display:block">🔄 שוב מההתחלה</button>
        </div>`;
}

// LEVEL 1
function renderLevel1(area){
    const d = level1Data[questionIdx];
    const shuffled = [...d.options].sort(()=>Math.random()-0.5);
    area.innerHTML=`
        <div class="game-title">🔊 הקשיבו ובחרו את התמונה הנכונה</div>
        <div class="match-word" onclick="speakWord('${d.word}')">${d.word} 🔊</div>
        <div class="match-images">${shuffled.map(e=>`<div class="match-img" onclick="checkMatch1(this,'${e}','${d.emoji}')">${e}</div>`).join('')}</div>
        <div class="feedback" id="fb"></div>
        <div class="progress">${questionIdx+1} / ${level1Data.length}</div>`;
    speakWord(d.word);
    lastReplayText = d.word; lastReplayElId = '';
}

function checkMatch1(el, picked, correct){
    if(picked===correct){
        el.classList.add('correct');
        document.getElementById('fb').innerHTML='<span class="success">!מצוין ✅</span>';
        speak(randomPraise());
        addXPandCoins();
        setTimeout(()=>{questionIdx++;render();},1500);
    } else {
        el.classList.add('wrong');
        document.getElementById('fb').innerHTML='<span class="error">נסה שוב</span>';
        speak('Try again!');
        setTimeout(()=>el.classList.remove('wrong'),400);
    }
}

// LEVEL 2
function renderLevel2(area){
    const d = level2Data[questionIdx];
    const shuffled = [...d.words].sort(()=>Math.random()-0.5);
    area.innerHTML=`
        <div class="game-title">🧩 סדרו את המילים למשפט</div>
        <div class="puzzle-img">${d.emoji}</div>
        <div class="puzzle-hint">${d.heb}</div>
        <div class="puzzle-slots" id="slots"></div>
        <div class="puzzle-words" id="pwords">${shuffled.map((w,i)=>`<button class="puzzle-word" onclick="pickWord2(this,'${w}')">${w}</button>`).join('')}</div>
        <div class="feedback" id="fb"></div>
        <div class="progress">${questionIdx+1} / ${level2Data.length}</div>`;
}

let currentSentence2=[];
function pickWord2(btn, word){
    btn.classList.add('used');
    currentSentence2.push(word);
    const d = level2Data[questionIdx % level2Data.length];
    document.getElementById('slots').innerHTML = currentSentence2.map(w=>`<span class="puzzle-slot">${w}</span>`).join('');
    speakWord(word);
    if(currentSentence2.length === d.words.length){
        if(currentSentence2.join(' ')===d.words.join(' ')){
            document.getElementById('fb').innerHTML='<span class="success">!מושלם ✅</span>';
            speak(randomPraise() + ' ' + d.sentence);
            addXPandCoins();
            setTimeout(()=>{currentSentence2=[];questionIdx++;render();},2500);
        } else {
            document.getElementById('fb').innerHTML='<span class="error">לא בדיוק, נסו שוב</span>';
            speak(['Not quite!','Try again!','Almost!','Oops!'][Math.floor(Math.random()*4)]);
            setTimeout(()=>{currentSentence2=[];render();},1500);
        }
    }
}

// LEVEL 3
function renderLevel3(area){
    const d = level3Data[questionIdx];
    area.innerHTML=`
        <div class="game-title">📖 קראו והשיבו</div>
        <div class="story-box"><div class="story-text sentence" id="storyText">${d.story.split(' ').map(w=>`<span class="word" onclick="speakWord('${w.replace(/[^a-zA-Z]/g,'')}')">${w}</span>`).join(' ')}</div></div>
        <button class="translate-btn" onclick="this.nextElementSibling.style.display='block';this.style.display='none'">📝 תרגום לעברית</button>
        <div style="display:none;text-align:center;color:#666;font-size:0.85em;margin:6px 0">${d.storyHeb}</div>
        <div style="font-family:'Fredoka One',cursive;text-align:center;margin:10px 0;direction:ltr" class="sentence" id="questionText">${d.question.split(' ').map(w=>`<span class="word" onclick="speakWord('${w.replace(/[^a-zA-Z]/g,'')}')">${w}</span>`).join(' ')}</div>
        <div class="options">${d.options.map((o,i)=>`<button class="option-btn" onclick="checkAnswer3(this,${i},${d.answer})">${o}</button>`).join('')}</div>
        <div class="feedback" id="fb"></div>
        <div class="progress">${questionIdx+1} / ${level3Data.length}</div>`;
    lastReplayText = d.story; lastReplayElId = 'storyText';
    highlightSentence(d.story, 'storyText', ()=>{
        highlightSentence(d.question, 'questionText');
    });
}

function highlightSentence(text, elId, onEnd){
    clearHighlightTimers();
    if(!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const rate = slowMode ? 0.6 : 1.0;
    const u = new SpeechSynthesisUtterance(text);
    u.lang='en-US'; u.rate = rate; u.pitch=1.1;
    if(onEnd) u.onend = onEnd;

    const words = document.querySelectorAll(`#${elId} .word`);

    // תמיד הפעל טיימר כ-fallback לפלאפון
    highlightByTimer(text, elId, rate);

    // אם onboundary עובד (מחשב) - השתמש בו ובטל את הטיימר
    let boundaryFired = false;
    u.onboundary = (e)=>{
        if(e.name !== 'word') return;
        if(!boundaryFired){
            boundaryFired = true;
            clearHighlightTimers(); // onboundary עובד - בטל טיימרים
        }
        words.forEach(w=>w.classList.remove('highlight'));
        let pos=0;
        for(let w of words){
            if(pos >= e.charIndex && pos < e.charIndex + (e.charLength||5) + 5){
                w.classList.add('highlight'); break;
            }
            pos += w.textContent.length+1;
        }
    };

    window.speechSynthesis.speak(u);
}

function checkAnswer3(btn, picked, correct){
    document.querySelectorAll('.option-btn').forEach(b=>b.disabled=true);
    if(picked===correct){
        btn.classList.add('correct');
        document.getElementById('fb').innerHTML='<span class="success">!נכון, כל הכבוד ✅</span>';
        speak(randomPraise());
        addXPandCoins();
        setTimeout(()=>{questionIdx++;render();},1500);
    } else {
        btn.classList.add('wrong');
        document.getElementById('fb').innerHTML='<span class="error">לא בדיוק, נסו שוב</span>';
        speak(['Not quite!','Try again!','Almost!','Oops!'][Math.floor(Math.random()*4)]);
        setTimeout(()=>render(),1500);
    }
}

// LEVEL 4
function renderLevel4(area){
    const d = level4Data[questionIdx % level4Data.length];
    // Build paragraph with each word as a span for highlighting
    let wordIdx = 0;
    let paragraphHtml = '';
    const parts = d.text.split(/(\[\w+\])/); // Split by blanks
    parts.forEach(part=>{
        const blankMatch = part.match(/^\[(\w+)\]$/);
        if(blankMatch){
            paragraphHtml += `<span class="blank empty" id="blank-${blankMatch[1]}" data-answer="${blankMatch[1]}">___</span> `;
        } else {
            // Wrap each word in a span
            part.split(/\s+/).filter(w=>w).forEach(w=>{
                paragraphHtml += `<span class="word" id="w4-${wordIdx}" onclick="speakWord('${w.replace(/[^a-zA-Z]/g,'')}')">${w}</span> `;
                wordIdx++;
            });
        }
    });
    
    const bankShuffled = [...d.bank].sort(()=>Math.random()-0.5);
    area.innerHTML=`
        <div class="game-title">✍️ השלימו את הסיפור</div>
        <div class="paragraph sentence" id="level4Text" style="direction:ltr">${paragraphHtml}</div>
        <div class="word-bank">${bankShuffled.map(w=>`<button class="bank-word" onclick="fillBlank4(this,'${w}')">${w}</button>`).join('')}</div>
        <div class="feedback" id="fb"></div>
        <div class="progress">${questionIdx+1} / ${level4Data.length}</div>`;
    // Auto-read with highlighting - skip blanks
    const readableText = d.text.replace(/\[(\w+)\]/g, '');
    lastReplayText = readableText; lastReplayElId = 'level4Text';
    highlightSentence(readableText, 'level4Text');
}

let filled4=[];
function fillBlank4(btn, word){
    const d = level4Data[questionIdx % level4Data.length];
    const nextBlank = d.blanks.find(b=>!filled4.includes(b));
    if(!nextBlank) return;
    const blankEl = document.getElementById('blank-'+nextBlank);
    if(word===nextBlank){
        blankEl.textContent = word;
        blankEl.classList.remove('empty');
        btn.classList.add('used');
        filled4.push(word);
        speakWord(word);
        if(filled4.length===d.blanks.length){
            document.getElementById('fb').innerHTML='<span class="success">!מעולה, סיימתם את הסיפור ✅</span>';
            addXPandCoins();addXPandCoins(); // Double reward for level 4
            const fullText = d.text.replace(/\[(\w+)\]/g,'$1');
            // Read the full completed sentence, then praise, then move on
            speak(fullText, ()=>{
                speak(randomPraise(), ()=>{
                    setTimeout(()=>{filled4=[];questionIdx++;render();},1000);
                });
            });
        }
    } else {
        btn.style.background='var(--accent)';
        setTimeout(()=>btn.style.background='',400);
    }
}

// Init
updateCoinsDisplay();
render();
